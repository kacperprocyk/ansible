- name: install apache and php on Ubuntu and RedHat hosts
  hosts: all
  become: true

  pre_tasks:

    - name: install updates (Rocky)
      tags: always
      dnf:
        update_only: yes
        update_cache: yes
      when: ansible_distribution == "Rocky"

    - name: install updates (Ubuntu)
      tags: always
      apt:
        upgrade: dist
        update_cache: yes
      when: ansible_distribution == "Ubuntu"


- hosts: workstations
  become: false
  tasks:

    - name: install unzip
      package:
        name: unzip
    
    - name: install terraform
      unarchive: 
        src: https://releases.hashicorp.com/terraform/1.14.8/terraform_1.14.8_linux_amd64.zip
        dest: /usr/local/bin
        remote_src: yes
        mode: 0755
        owner: root
        group: root


- hosts: web_servers
  become: true
  tasks:

    - name: apache and php installation on Ubuntu family hosts --> web_servers
      tags: apache,php,ubuntu
      package:
        name: 
          - apache2
          - libapache2-mod-php
        state: latest
      when: ansible_distribution == "Ubuntu"
  
    - name: apache and php installation on RedHat family hosts --> web_servers
      tags: httpd,php,rocky
      package:
        name:
          - httpd
          - php
        state: latest
      when: ansible_distribution == "Rocky"

    - name: copy default_site.html file into servers
      tags: apache,apache2,httpd
      copy:
        src: default_site.html
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: 644
      

- hosts: db_servers
  become: true
  tasks:

    - name: install mariadb on db_servers (Ubuntu)
      tags: mariadb,ubuntu,db
      package:
        name: mariadb-server
        state: latest
      when: ansible_distribution == "Ubuntu"

    - name: install mariadb on db_servers (Rocky)
      tags: mariadb,rocky,db
      package:
        name: mariadb
        state: latest
      when: ansible_distribution == "Rocky"

- hosts: file_servers
  become: true
  tasks:
  
    - name: install samba package
      tags: samba
      package:
        name: samba
        state: latest

    - name: copy default file
      tags: samba
      copy:
        src: file3.txt
        dest: /home/copied_file3.txt
        owner: root
        group: root
        mode: 0644




