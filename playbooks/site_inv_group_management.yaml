- name: install apache and php on Ubuntu and RedHat hosts
  hosts: all
  become: true

  pre_tasks:

    - name: install updates (Rocky)
      dnf:
        update_only: yes
        update_cache: yes
      when: ansible_distribution == "Rocky"

    - name: install updates (Ubuntu)
      apt:
        upgrade: dist
        update_cache: yes
      when: ansible_distribution == "Ubuntu"

- hosts: web_servers
  become: true
  tasks:

    - name: apache and php installation on Ubuntu family hosts --> web_servers
      package:
        name: 
          - apache2
          - libapache2-mod-php
        state: latest
      when: ansible_distribution == "Ubuntu"
  
    - name: apache and php installation on RedHat family hosts --> web_servers
      package:
        name:
          - httpd
          - php
        state: latest
      when: ansible_distribution == "Rocky"

- hosts: db_servers
  become: true
  tasks:

    - name: install mariadb on db_servers (Ubuntu)
      package:
        name: mariadb-server
        state: latest
      when: ansible_distribution == "Ubuntu"

    - name: install mariadb on db_servers (Rocky)
      package:
        name: mariadb
        state: latest
      when: ansible_distribution == "Rocky"

- hosts: file_servers
  become: true
  tasks:
  
    - name: install samba package
      package:
        name: samba
        state: latest





