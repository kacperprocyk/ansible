- name: install apache2 package
  hosts: all
  become: true

  tasks:
    - name: update repository index
      apt:
        update_cache: yes

    - name: apache2 package instalation
      apt:
        name: apache2
        state: latest

    - name: add php support for apache
      apt: 
        name: libapache2-mod-php
        state: latest
