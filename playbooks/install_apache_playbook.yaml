- name: install apache2 package
  hosts: all
  become: true

  tasks:
    - name: update repository index
      apt:
        update_cache: yes
      when: ansible_distribution in ["Debian", "Ubuntu"]

    - name: apache2 package instalation
      apt:
        name: apache2
        state: latest
      when: ansible_distribution == "Ubuntu"

    - name: add php support for apache
      apt: 
        name: libapache2-mod-php
        state: latest
      when: ansible_distribution == "Ubuntu" and ansible_distribution_version == "24.04"
# use gather_facts module to obtain required infomration

    - name: update repository index
      dnf:
        update_cache: yes
      when: ansible_distribution == "Rocky"

    - name: apache2 package instalation
      dnf:
        name: httpd
        state: latest
      when: ansible_distribution == "Rocky"

    - name: add php support for apache
      dnf: 
        name: php
        state: latest
      when: ansible_distribution == "Rocky" and ansible_distribution_version == "9.3"
# use gather_facts module to obtain required infomration
