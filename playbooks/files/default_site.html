<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        main {
            padding: 2rem;
        }
        section {
            background: #fff;
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 8px;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background: #333;
            color: #fff;
        }
        button {
            padding: 0.5rem 1rem;
            border: none;
            background: #007BFF;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<header>
    <h1>Dummy HTML Page</h1>
</header>

<main>
    <section>
        <h2>O mnie</h2>
        <p>To jest przykładowy paragraf tekstu. Możesz tutaj wstawić dowolną treść.</p>
    </section>

    <section>
        <h2>Lista</h2>
        <ul>
            <li>Element 1</li>
            <li>Element 2</li>
            <li>Element 3</li>
        </ul>
    </section>

    <section>
        <h2>Formularz</h2>
        <form>
            <label for="name">Imię:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <button type="submit">Wyślij</button>
        </form>
    </section>
</main>

<footer>
    <p>&copy; 2026 Dummy Company</p>
</footer>

</body>
</html>
